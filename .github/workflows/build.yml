name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: cmd
        run: |
          msbuild PharmaDataGuard.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo /verbosity:minimal

      - name: Install WiX v3 (Chocolatey)
        shell: powershell
        run: |
          choco install wixtoolset --version 3.14.0 -y --no-progress

      - name: Build MSI
        shell: cmd
        run: |
          cd installer
          call build-msi.cmd

      - name: Sign binaries (optional)
        if: ${{ secrets.SIGNING_CERT_PFX_BASE64 != '' }}
        shell: powershell
        env:
          SIGNING_CERT_PFX_BASE64: ${{ secrets.SIGNING_CERT_PFX_BASE64 }}
          SIGNING_CERT_PASSWORD:   ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          $bytes = [Convert]::FromBase64String($env:SIGNING_CERT_PFX_BASE64)
          $pfx   = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, $bytes)
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
                       Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1).FullName
          $targets = @(
            'PharmaDataGuard\bin\Release\PharmaDataGuard.exe',
            'PharmaDataGuard.LogVerifier\bin\Release\PharmaDataGuard.LogVerifier.exe',
            'installer\PharmaDataGuard.msi'
          )
          foreach ($t in $targets) {
            & $signtool sign /f $pfx /p $env:SIGNING_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $t
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $t" }
          }
          Remove-Item $pfx -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pharma-data-guard-21cfr-build
          path: |
            PharmaDataGuard/bin/Release/PharmaDataGuard.exe
            PharmaDataGuard/bin/Release/PharmaDataGuard.exe.config
            PharmaDataGuard.LogVerifier/bin/Release/PharmaDataGuard.LogVerifier.exe
            installer/PharmaDataGuard.msi

      - name: GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PharmaDataGuard/bin/Release/PharmaDataGuard.exe
            PharmaDataGuard.LogVerifier/bin/Release/PharmaDataGuard.LogVerifier.exe
            installer/PharmaDataGuard.msi
